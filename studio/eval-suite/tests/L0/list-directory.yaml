id: l0-list-directory
level: L0
domain:
  - tool
  - file
phases:
  - execute
fixture:
  kind: template
  path: l0-list-fixture
instruction: |
  List all files in the `src` directory and create a file called `file_list.txt` containing each filename on a new line.
success:
  - kind: all
    scorers:
      - kind: file_exists
        path: file_list.txt
      - kind: regex_in
        file: file_list.txt
        pattern: "main\\.rs"
      - kind: regex_in
        file: file_list.txt
        pattern: "lib\\.rs"
budget:
  max_tool_calls: 10
  max_tokens: 10000
  max_wallclock_secs: 60
runs_required: 1
pass_threshold: 1.0
