id: l2-with-job
level: L2
domain:
  - reactor
  - job
phases:
  - plan
  - execute
  - verify
fixture:
  kind: tarball
  path: reactor-blank.tar.gz
instruction: |
  Add a background job called `SendEmail` that takes an `email` address and `subject` as parameters. The job should be defined in the standard reactor.cloud job format.
success:
  - kind: all
    scorers:
      - kind: cargo_check
      - kind: regex_in
        file: src/jobs/
        pattern: "SendEmail"
      - kind: regex_in
        file: src/jobs/
        pattern: "email"
budget:
  max_tool_calls: 30
  max_tokens: 50000
  max_wallclock_secs: 180
runs_required: 1
pass_threshold: 1.0
