id: l3-fix-type-error
level: L3
domain:
  - reactor
  - debug
phases:
  - analyze
  - execute
  - verify
fixture:
  kind: template
  path: l3-type-error-fixture
instruction: |
  The code has a type error: `expected String, found &str`. Find and fix it.
success:
