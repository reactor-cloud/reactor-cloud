name: Feature Request
description: Suggest an idea for Reactor.cloud
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've considered?
  - type: dropdown
    id: capability
    attributes:
      label: Related Capability
      description: Which capability would this affect?
      options:
        - Identity (reactor-auth)
        - Data (reactor-data)
        - Storage (reactor-storage)
        - Functions (reactor-functions)
        - Jobs (reactor-jobs)
        - Sites (reactor-sites)
        - Gateway (reactor-gateway)
        - Connect (reactor-connect)
        - CLI (reactor-cli)
        - SDK
        - New Capability
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples
