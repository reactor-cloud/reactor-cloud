name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: Tell us what you see
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run `reactor dev`
        2. Navigate to...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: capability
    attributes:
      label: Affected Capability
      description: Which capability is affected?
      options:
        - Identity (reactor-auth)
        - Data (reactor-data)
        - Storage (reactor-storage)
        - Functions (reactor-functions)
        - Jobs (reactor-jobs)
        - Sites (reactor-sites)
        - Gateway (reactor-gateway)
        - Connect (reactor-connect)
        - CLI (reactor-cli)
        - SDK
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you running?
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please paste any relevant logs
      render: shell
