name: Swift SDK CI

on:
  push:
    branches: [main]
    paths:
      - 'sdks/swift/**'
      - '.github/workflows/swift-sdk-ci.yml'
  pull_request:
    paths:
      - 'sdks/swift/**'
      - '.github/workflows/swift-sdk-ci.yml'

defaults:
  run:
    working-directory: sdks/swift

jobs:
  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Swift Version
        run: swift --version

      - name: Build (Debug)
        run: swift build

      - name: Build (Release)
        run: swift build -c release

      - name: Run Tests
        run: swift test

  build-ios:
    name: Build (iOS Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -scheme Reactor \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
            -skipPackagePluginValidation \
            | xcpretty

  size-check:
    name: Size Budget Check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build Release
        run: swift build -c release

      - name: Check Binary Size
        run: |
          # Get the build directory
          BUILD_DIR=$(swift build -c release --show-bin-path)
          
          echo "Build artifacts in: $BUILD_DIR"
          ls -la "$BUILD_DIR" || true
          
          # Check static library sizes (if any)
          find .build -name "*.a" -exec ls -lh {} \; 2>/dev/null || true
          
          # Report total .build size
          echo ""
          echo "Total .build/release size:"
          du -sh .build/release 2>/dev/null || echo "N/A"

  openapi-drift:
    name: OpenAPI Drift Check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Check OpenAPI Spec Timestamp
        run: |
          JS_SPEC="../../sdks/js/openapi/spec.json"
          if [ -f "$JS_SPEC" ]; then
            echo "OpenAPI spec found at: $JS_SPEC"
            echo "Last modified: $(stat -f '%Sm' "$JS_SPEC" 2>/dev/null || stat -c '%y' "$JS_SPEC" 2>/dev/null || echo 'unknown')"
          else
            echo "Warning: OpenAPI spec not found at $JS_SPEC"
          fi
          
          # Future: compare with generated types
          echo "OpenAPI drift check placeholder - implement codegen comparison"

  docs:
    name: Build Documentation
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build DocC Documentation
        run: |
          swift package generate-documentation \
            --target Reactor \
            --disable-indexing \
            --transform-for-static-hosting \
            --output-path docs
        continue-on-error: true

      - name: Upload Documentation Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: docc-documentation
          path: sdks/swift/docs
          retention-days: 7
