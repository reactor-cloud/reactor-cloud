# Reactor AI Model Registry
# This file defines all available models and their routing aliases.
# Baked into the library at compile time; can be overridden via config.

[providers.openrouter]
base_url = "https://openrouter.ai/api/v1"

[providers.bedrock]
# AWS region comes from config

[providers.foundry]
# Azure Foundry endpoint comes from config

# ============================================================================
# Concrete Models
# ============================================================================

# Anthropic models
[[models]]
id = "anthropic/claude-opus-4"
provider = "bedrock"
upstream_id = "anthropic.claude-opus-4-7"
fallback = "anthropic/claude-opus-4"
input_price_per_1m = 15.00
output_price_per_1m = 75.00
context_window = 1000000
capabilities = ["chat", "reasoning", "tools", "vision"]
speed_class = "slow"
quality_score = 95

