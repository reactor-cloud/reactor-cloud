# ============================================================================
# Aliases
# ============================================================================

[[aliases]]
pattern = "anthropic/opus/latest"
resolves_to = "anthropic/claude-opus-4"

[[aliases]]
pattern = "anthropic/sonnet/latest"
resolves_to = "anthropic/claude-sonnet-4"

[[aliases]]
pattern = "reasoning/cheapest"
strategy = "cheapest_with_capability"
capability = "reasoning"

[[aliases]]
pattern = "reasoning/fastest"
strategy = "fastest_with_capability"
capability = "reasoning"

[[aliases]]
pattern = "reasoning/best"
strategy = "best_value"
capability = "reasoning"

[[aliases]]
pattern = "coding/cheapest"
strategy = "cheapest_with_capability"
capability = "tools"

[[aliases]]
pattern = "coding/best-value"
strategy = "best_value"
capability = "tools"

[[aliases]]
pattern = "chat/cheapest"
strategy = "cheapest_with_capability"
capability = "chat"

[[aliases]]
pattern = "vision/cheapest"
strategy = "cheapest_with_capability"
capability = "vision"

[[aliases]]
pattern = "embeddings/cheapest"
strategy = "cheapest_with_capability"
capability = "embeddings"

[[aliases]]
pattern = "embeddings/best"
strategy = "best_value"
capability = "embeddings"
