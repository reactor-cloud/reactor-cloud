[package]
name = "reactor-vault"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Reactor Vault — Secret management with Embedded and OpenBao backends"

[features]
default = ["embedded"]
embedded = []
openbao = ["vaultrs", "vaultrs-login", "reqwest"]

[dependencies]
# Core types and traits
reactor-core.workspace = true

# Async runtime with file system support
tokio = { workspace = true, features = ["fs", "io-util", "sync", "rt-multi-thread", "macros"] }

# Serialization
serde.workspace = true
serde_json.workspace = true

# Error handling
thiserror.workspace = true

# Observability
tracing.workspace = true

# Async utilities
async-trait.workspace = true

# Time
chrono.workspace = true

# IDs
uuid.workspace = true

# Crypto (for embedded vault)
aes-gcm.workspace = true
rand.workspace = true
base64.workspace = true
hex.workspace = true

# In-memory caching with TTL
moka.workspace = true

# OpenBao client (optional)
vaultrs = { version = "0.7", optional = true }
vaultrs-login = { version = "0.2", optional = true }
reqwest = { workspace = true, optional = true }

# URL handling
url.workspace = true

[dev-dependencies]
tempfile.workspace = true
toml.workspace = true
