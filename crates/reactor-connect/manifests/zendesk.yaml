# Zendesk Support Connector Manifest
# License: MIT (Airbyte Low-Code CDK compatible)
version: "0.1.0"
type: DeclarativeSource

definitions:
  basic_authenticator:
    type: BasicHttpAuthenticator
    username: "{{ config['email'] }}/token"
    password: "{{ config['api_token'] }}"

  base_requester:
    type: HttpRequester
    url_base: "https://{{ config['subdomain'] }}.zendesk.com/api/v2"
    authenticator:
      $ref: "#/definitions/basic_authenticator"
    http_method: GET

  cursor_paginator:
    type: DefaultPaginator
    pagination_strategy:
      type: CursorPagination
      cursor_value: "{{ response.meta.after_cursor }}"
      stop_condition: "{{ response.meta.has_more is false }}"
    page_token_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: "page[after]"

  tickets_stream:
    type: DeclarativeStream
    name: tickets
    primary_key: id
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: /tickets
      paginator:
        $ref: "#/definitions/cursor_paginator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: ["tickets"]

  users_stream:
    type: DeclarativeStream
    name: users
    primary_key: id
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: /users
      paginator:
        $ref: "#/definitions/cursor_paginator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: ["users"]

  organizations_stream:
    type: DeclarativeStream
    name: organizations
    primary_key: id
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: /organizations
      paginator:
        $ref: "#/definitions/cursor_paginator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: ["organizations"]

check:
  type: CheckStream
  stream_names:
    - tickets

spec:
  type: Spec
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    type: object
    required:
      - subdomain
      - email
      - api_token
    properties:
      subdomain:
        type: string
        title: Subdomain
        description: Your Zendesk subdomain
      email:
        type: string
        title: Email
        description: Your Zendesk email address
      api_token:
        type: string
        title: API Token
        description: Your Zendesk API token
        airbyte_secret: true

streams:
  - $ref: "#/definitions/tickets_stream"
  - $ref: "#/definitions/users_stream"
  - $ref: "#/definitions/organizations_stream"
