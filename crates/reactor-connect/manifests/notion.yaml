version: "0.1.0"
type: DeclarativeSource

definitions:
  bearer_authenticator:
    type: BearerAuthenticator
    api_token: "{{ config['access_token'] }}"

  base_requester:
    type: HttpRequester
    url_base: "https://api.notion.com/v1"
    authenticator:
      $ref: "#/definitions/bearer_authenticator"
    http_method: GET
    request_headers:
      Notion-Version: "2022-06-28"

  cursor_paginator:
    type: DefaultPaginator
    pagination_strategy:
      type: CursorPagination
      cursor_value: "{{ response.next_cursor }}"
      stop_condition: "{{ response.has_more is false }}"
    page_token_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: start_cursor

  databases_stream:
    type: DeclarativeStream
    name: databases
    primary_key: id
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: /search
        http_method: POST
        request_body_json:
          filter:
            property: object
            value: database
      paginator:
        $ref: "#/definitions/cursor_paginator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: ["results"]

  pages_stream:
    type: DeclarativeStream
    name: pages
    primary_key: id
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: /search
        http_method: POST
        request_body_json:
          filter:
            property: object
            value: page
      paginator:
        $ref: "#/definitions/cursor_paginator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: ["results"]

  users_stream:
    type: DeclarativeStream
    name: users
    primary_key: id
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: /users
      paginator:
        $ref: "#/definitions/cursor_paginator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: ["results"]

check:
  type: CheckStream
  stream_names:
    - users

spec:
  type: Spec
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    type: object
    required:
      - access_token
    properties:
      access_token:
        type: string
        title: Access Token
        description: Your Notion integration token
        airbyte_secret: true

streams:
  - $ref: "#/definitions/databases_stream"
  - $ref: "#/definitions/pages_stream"
  - $ref: "#/definitions/users_stream"
