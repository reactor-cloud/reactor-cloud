# Airtable Connector Manifest
# License: MIT (Airbyte Low-Code CDK compatible)
version: "0.1.0"
type: DeclarativeSource

definitions:
  bearer_authenticator:
    type: BearerAuthenticator
    api_token: "{{ config['api_key'] }}"

  base_requester:
    type: HttpRequester
    url_base: "https://api.airtable.com/v0"
    authenticator:
      $ref: "#/definitions/bearer_authenticator"
    http_method: GET

  bases_stream:
    type: DeclarativeStream
    name: bases
    primary_key: id
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: /meta/bases
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: ["bases"]

check:
  type: CheckStream
  stream_names:
    - bases

spec:
  type: Spec
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    type: object
    required:
      - api_key
    properties:
      api_key:
        type: string
        title: API Key
        description: Your Airtable personal access token
        airbyte_secret: true

streams:
  - $ref: "#/definitions/bases_stream"
