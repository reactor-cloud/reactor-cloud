# ${name^} Connector Manifest
# License: MIT (Airbyte Low-Code CDK compatible)
version: "0.1.0"
type: DeclarativeSource

definitions:
  bearer_authenticator:
    type: BearerAuthenticator
    api_token: "{{ config['api_key'] }}"

  base_requester:
    type: HttpRequester
    url_base: "https://api.example.com/v1"
    authenticator:
      $ref: "#/definitions/bearer_authenticator"
    http_method: GET

  base_stream:
    type: DeclarativeStream
    name: records
    primary_key: id
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: /records
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: ["data"]

check:
  type: CheckStream
  stream_names:
    - records

spec:
  type: Spec
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    type: object
    required:
      - api_key
    properties:
      api_key:
        type: string
        title: API Key
        airbyte_secret: true

streams:
  - $ref: "#/definitions/base_stream"
